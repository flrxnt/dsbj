name: Release & Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (ex: v1.2.2)'
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: resolve
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${INPUT_TAG:-$REF_NAME}"
          printf 'TAG=%s\n' "$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.resolve.outputs.TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Setup Node (npm registry auth)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build library
        run: bun run build

      - name: Security audit
        run: |
          npm i --package-lock-only --ignore-scripts
          npm audit --audit-level=moderate
          rm package-lock.json

      - name: Verify package version matches tag
        id: version
        env:
          TAG: ${{ steps.resolve.outputs.TAG }}
        run: |
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG ne correspond pas à la version du package ($PKG_VERSION)"
            exit 1
          fi
          printf 'VERSION=%s\n' "$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)

          DELIM="CHANGELOG_$(openssl rand -hex 8)"
          {
            printf 'RELEASE_BODY<<%s\n' "$DELIM"
            printf '%s\n' "$BODY"
            printf '%s\n' "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.resolve.outputs.TAG }}
          name: ${{ steps.resolve.outputs.TAG }}
          body: ${{ steps.changelog.outputs.RELEASE_BODY }}
          generate_release_notes: false
